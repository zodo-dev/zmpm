name: Publish to npm

# Publishes @zodo/zmpm to npm on a `v<semver>` tag using npm Trusted Publishing
# (OIDC) — no long-lived token, no 2FA bypass. Requires a Trusted Publisher to be
# configured on npmjs.com for this package (repo: zodo-dev/zmpm, workflow:
# npm-publish.yml). npm adds build provenance automatically.
#
# Release:  npm version <patch|minor|major> && git push --follow-tags

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  id-token: write # required for OIDC trusted publishing
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 bundles npm >= 11.5.1 with sigstore intact (OIDC provenance).
          # Do NOT `npm install -g npm@latest` — that self-upgrade drops the
          # bundled `sigstore` dep and breaks `npm publish` provenance.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Show tool versions
        run: node -v && npm -v

      - name: Verify tag matches package.json
        run: |
          want="${GITHUB_REF_NAME#v}"
          have=$(node -p "require('./package.json').version")
          if [ "$have" != "$want" ]; then
            echo "::error::package.json version ($have) != tag ($want)"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Publish (OIDC — no token)
        run: npm publish
